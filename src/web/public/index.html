<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>微信机器人管理后台</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; color: #333; }
    .container { max-width: 1200px; margin: 0 auto; padding: 20px; }

    /* Header */
    .header { background: linear-gradient(135deg, #07c160, #06ad56); color: white; padding: 20px 30px; border-radius: 12px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
    .header h1 { font-size: 24px; }
    .header .status-badge { background: rgba(255,255,255,0.2); padding: 6px 16px; border-radius: 20px; font-size: 14px; }

    /* Login */
    .login-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 100; }
    .login-box { background: white; padding: 40px; border-radius: 12px; width: 360px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
    .login-box h2 { margin-bottom: 20px; text-align: center; }
    .login-box input { width: 100%; padding: 12px; margin-bottom: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
    .login-box button { width: 100%; padding: 12px; background: #07c160; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; }
    .login-box button:hover { background: #06ad56; }
    .login-error { color: #e74c3c; text-align: center; margin-top: 10px; font-size: 14px; }

    /* Cards */
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 20px; margin-bottom: 20px; }
    .card { background: white; border-radius: 12px; padding: 24px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
    .card h3 { font-size: 16px; color: #666; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
    .card h3 .icon { font-size: 20px; }

    /* Stats */
    .stat-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #f0f0f0; }
    .stat-row:last-child { border-bottom: none; }
    .stat-label { color: #888; }
    .stat-value { font-weight: 600; }

    /* Status indicators */
    .status-ok { color: #07c160; }
    .status-warn { color: #f39c12; }
    .status-error { color: #e74c3c; }

    /* Buttons */
    .btn { padding: 8px 16px; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; transition: all 0.2s; }
    .btn-primary { background: #07c160; color: white; }
    .btn-primary:hover { background: #06ad56; }
    .btn-danger { background: #e74c3c; color: white; }
    .btn-danger:hover { background: #c0392b; }
    .btn-warning { background: #f39c12; color: white; }
    .btn-warning:hover { background: #e67e22; }
    .btn-group { display: flex; gap: 8px; margin-top: 16px; }

    /* Config form */
    .config-form { display: grid; gap: 12px; }
    .form-group { display: grid; gap: 4px; }
    .form-group label { font-size: 13px; color: #666; }
    .form-group input, .form-group select, .form-group textarea {
      padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; font-family: inherit;
    }
    .form-group textarea { min-height: 80px; resize: vertical; }

    /* Logs */
    .log-container { max-height: 400px; overflow-y: auto; background: #1e1e1e; border-radius: 8px; padding: 16px; font-family: 'Monaco', 'Consolas', monospace; font-size: 12px; line-height: 1.6; }
    .log-line { color: #d4d4d4; }
    .log-line.error { color: #f48771; }
    .log-time { color: #6a9955; }

    /* Toast */
    .toast { position: fixed; bottom: 20px; right: 20px; background: #333; color: white; padding: 12px 24px; border-radius: 8px; opacity: 0; transition: opacity 0.3s; z-index: 200; }
    .toast.show { opacity: 1; }

    /* Responsive */
    @media (max-width: 768px) {
      .grid { grid-template-columns: 1fr; }
      .header { flex-direction: column; gap: 10px; }
    }
  </style>
</head>
<body>
  <!-- Login Overlay -->
  <div id="loginOverlay" class="login-overlay">
    <div class="login-box">
      <h2>🤖 微信机器人管理</h2>
      <input type="text" id="loginUser" placeholder="用户名" value="admin">
      <input type="password" id="loginPass" placeholder="密码">
      <button onclick="doLogin()">登录</button>
      <div id="loginError" class="login-error"></div>
    </div>
  </div>

  <!-- Main Content -->
  <div class="container" id="mainContent" style="display:none">
    <div class="header">
      <h1>🤖 微信机器人管理后台</h1>
      <div>
        <span id="headerStatus" class="status-badge">加载中...</span>
        <button class="btn" style="background:rgba(255,255,255,0.2);color:white;margin-left:10px" onclick="logout()">退出</button>
      </div>
    </div>

    <div class="grid">
      <!-- Service Status -->
      <div class="card">
        <h3><span class="icon">📊</span> 服务状态</h3>
        <div id="serviceStatus">加载中...</div>
      </div>

      <!-- WeChat Status -->
      <div class="card">
        <h3><span class="icon">💬</span> 微信连接</h3>
        <div id="wechatStatus">加载中...</div>
        <div class="btn-group">
          <button class="btn btn-warning" onclick="reconnectWeChat()">重新连接</button>
        </div>
      </div>

      <!-- Queue & Watchdog -->
      <div class="card">
        <h3><span class="icon">⚙️</span> 队列 & 监控</h3>
        <div id="queueStatus">加载中...</div>
        <div class="btn-group">
          <button class="btn btn-primary" onclick="resetWatchdog()">重置看门狗</button>
        </div>
      </div>

      <!-- Quick Actions -->
      <div class="card">
        <h3><span class="icon">🚀</span> 快捷操作</h3>
        <div class="btn-group" style="flex-wrap:wrap">
          <button class="btn btn-danger" onclick="restartService()">重启服务</button>
          <button class="btn btn-primary" onclick="refreshStatus()">刷新状态</button>
        </div>
      </div>
    </div>

    <!-- Config Editor -->
    <div class="card" style="margin-bottom:20px">
      <h3><span class="icon">📝</span> 配置管理</h3>
      <div class="config-form" id="configForm">加载中...</div>
      <div class="btn-group">
        <button class="btn btn-primary" onclick="saveConfig()">保存配置</button>
      </div>
    </div>

    <!-- Template Editor -->
    <div class="card" style="margin-bottom:20px">
      <h3><span class="icon">📝</span> 模板编辑</h3>
      <div class="form-group">
        <label>选择模板</label>
        <select id="templateSelect" onchange="loadTemplate()">
          <option value="help">帮助菜单</option>
        </select>
      </div>
      <div class="form-group">
        <label>模板内容 <small style="color:#888">（可用 {botname} 作为机器人名称占位符）</small></label>
        <textarea id="templateContent" style="min-height:200px;font-family:monospace"></textarea>
      </div>
      <div class="btn-group">
        <button class="btn btn-primary" onclick="saveTemplate()">保存模板</button>
        <button class="btn btn-warning" onclick="resetTemplate()">恢复默认</button>
      </div>
    </div>

    <!-- Logs -->
    <div class="card">
      <h3><span class="icon">📋</span> 运行日志</h3>
      <div class="log-container" id="logContainer">加载中...</div>
      <div class="btn-group">
        <button class="btn btn-primary" onclick="refreshLogs()">刷新日志</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast"></div>

  <script>
    let token = localStorage.getItem('wxbot_token');

    // Check if already logged in
    if (token) {
      document.getElementById('loginOverlay').style.display = 'none';
      document.getElementById('mainContent').style.display = 'block';
      loadAll();
    }

    // Auto-refresh every 30s
    setInterval(() => {
      if (token) refreshStatus();
    }, 30000);

    async function doLogin() {
      const user = document.getElementById('loginUser').value;
      const pass = document.getElementById('loginPass').value;
      const errEl = document.getElementById('loginError');

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: user, password: pass }),
        });
        const data = await res.json();

        if (res.ok && data.token) {
          token = data.token;
          localStorage.setItem('wxbot_token', token);
          document.getElementById('loginOverlay').style.display = 'none';
          document.getElementById('mainContent').style.display = 'block';
          errEl.textContent = '';
          loadAll();
        } else {
          errEl.textContent = data.error || '登录失败';
        }
      } catch (e) {
        errEl.textContent = '网络错误';
      }
    }

    function logout() {
      token = null;
      localStorage.removeItem('wxbot_token');
      document.getElementById('loginOverlay').style.display = 'flex';
      document.getElementById('mainContent').style.display = 'none';
    }

    async function api(method, path, body) {
      const opts = {
        method,
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${token}`,
        },
      };
      if (body) opts.body = JSON.stringify(body);
      const res = await fetch(path, opts);
      if (res.status === 401) { logout(); return null; }
      return res.json();
    }

    async function loadAll() {
      await refreshStatus();
      await loadConfig();
      await loadTemplate();
      await refreshLogs();
    }

    async function refreshStatus() {
      const data = await api('GET', '/api/status');
      if (!data) return;

      // Header status
      const connected = data.wechat?.connected;
      document.getElementById('headerStatus').textContent = connected ? '✅ 运行中' : '⚠️ 离线';
      document.getElementById('headerStatus').style.background = connected ? 'rgba(255,255,255,0.2)' : 'rgba(231,76,60,0.3)';

      // Service status
      document.getElementById('serviceStatus').innerHTML = `
        <div class="stat-row"><span class="stat-label">运行时间</span><span class="stat-value">${data.service?.uptimeHuman || '-'}</span></div>
        <div class="stat-row"><span class="stat-label">进程PID</span><span class="stat-value">${data.service?.pid || '-'}</span></div>
        <div class="stat-row"><span class="stat-label">Node版本</span><span class="stat-value">${data.service?.nodeVersion || '-'}</span></div>
        <div class="stat-row"><span class="stat-label">内存占用</span><span class="stat-value">${data.memory?.rss || '-'}</span></div>
        <div class="stat-row"><span class="stat-label">堆内存</span><span class="stat-value">${data.memory?.heapUsed || '-'} / ${data.memory?.heapTotal || '-'}</span></div>
        <div class="stat-row"><span class="stat-label">AI模型</span><span class="stat-value">${data.config?.provider} / ${data.config?.model}</span></div>
      `;

      // WeChat status
      const wc = data.wechat || {};
      document.getElementById('wechatStatus').innerHTML = `
        <div class="stat-row"><span class="stat-label">连接状态</span><span class="stat-value ${connected ? 'status-ok' : 'status-error'}">${connected ? '已连接' : '未连接'}</span></div>
        <div class="stat-row"><span class="stat-label">群组数量</span><span class="stat-value">${wc.groupCount || 0}</span></div>
        <div class="stat-row"><span class="stat-label">联系人数量</span><span class="stat-value">${wc.contactCount || 0}</span></div>
      `;

      // Queue & watchdog
      const q = data.queue || {};
      const w = data.watchdog || {};
      document.getElementById('queueStatus').innerHTML = `
        <div class="stat-row"><span class="stat-label">队列等待</span><span class="stat-value">${q.pending || 0} 条</span></div>
        <div class="stat-row"><span class="stat-label">处理中</span><span class="stat-value ${q.processing ? 'status-warn' : ''}">${q.processing ? '是' : '否'}</span></div>
        <div class="stat-row"><span class="stat-label">看门狗</span><span class="stat-value ${w.running ? 'status-ok' : 'status-warn'}">${w.running ? '运行中' : '已停止'}</span></div>
        <div class="stat-row"><span class="stat-label">连续故障</span><span class="stat-value ${(w.consecutiveFailures || 0) > 0 ? 'status-error' : ''}">${w.consecutiveFailures || 0}</span></div>
      `;
    }

    async function loadConfig() {
      const data = await api('GET', '/api/config');
      if (!data) return;

      document.getElementById('configForm').innerHTML = `
        <h4 style="margin:16px 0 8px;color:#666">LLM 配置</h4>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
          <div class="form-group">
            <label>LLM 提供商</label>
            <select id="cfg_provider">
              <option value="deepseek" ${data.llm?.provider === 'deepseek' ? 'selected' : ''}>DeepSeek</option>
              <option value="mimo" ${data.llm?.provider === 'mimo' ? 'selected' : ''}>MiMo</option>
            </select>
          </div>
          <div class="form-group">
            <label>模型名称</label>
            <input id="cfg_model" value="${data.llm?.model || ''}">
          </div>
          <div class="form-group">
            <label>API Key</label>
            <input id="cfg_apiKey" type="password" placeholder="留空则不修改" value="">
          </div>
          <div class="form-group">
            <label>API 地址</label>
            <input id="cfg_baseUrl" value="${data.llm?.baseURL || ''}">
          </div>
        </div>

        <h4 style="margin:16px 0 8px;color:#666">风控配置</h4>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
          <div class="form-group">
            <label>每群每小时最大回复</label>
            <input id="cfg_maxHour" type="number" value="${data.risk?.maxMsgPerHour || 20}">
          </div>
          <div class="form-group">
            <label>消息延迟(秒)</label>
            <div style="display:flex;gap:8px">
              <input id="cfg_minInterval" type="number" value="${data.risk?.minInterval || 2}" style="width:50%">
              <input id="cfg_maxInterval" type="number" value="${data.risk?.maxInterval || 5}" style="width:50%">
            </div>
          </div>
          <div class="form-group">
            <label>工作时间</label>
            <div style="display:flex;gap:8px">
              <input id="cfg_workStart" type="number" value="${data.risk?.workStart || 0}" style="width:50%">
              <input id="cfg_workEnd" type="number" value="${data.risk?.workEnd || 0}" style="width:50%">
            </div>
          </div>
          <div class="form-group">
            <label>随机跳过率</label>
            <input id="cfg_skipRate" type="number" step="0.05" value="${data.risk?.randomSkipRate || 0.1}">
          </div>
        </div>

        <h4 style="margin:16px 0 8px;color:#666">机器人配置</h4>
        <div class="form-group">
          <label>机器人名称</label>
          <input id="cfg_botName" value="${data.bot?.name || ''}">
        </div>
        <div class="form-group">
          <label>机器人人设</label>
          <textarea id="cfg_personality">${data.bot?.personality || ''}</textarea>
        </div>
        <div class="form-group">
          <label>总结定时 (cron)</label>
          <input id="cfg_cron" value="${data.summary?.cron || ''}">
        </div>
      `;
    }

    async function saveConfig() {
      const updates = {
        llm_provider: document.getElementById('cfg_provider').value,
        llm_model: document.getElementById('cfg_model').value,
        llm_base_url: document.getElementById('cfg_baseUrl').value,
        max_msg_per_hour: document.getElementById('cfg_maxHour').value,
        min_msg_interval: document.getElementById('cfg_minInterval').value,
        max_msg_interval: document.getElementById('cfg_maxInterval').value,
        work_start_hour: document.getElementById('cfg_workStart').value,
        work_end_hour: document.getElementById('cfg_workEnd').value,
        random_skip_rate: document.getElementById('cfg_skipRate').value,
        bot_name: document.getElementById('cfg_botName').value,
        bot_personality: document.getElementById('cfg_personality').value,
        summary_cron: document.getElementById('cfg_cron').value,
      };

      // API Key 只有用户输入了才更新
      const apiKey = document.getElementById('cfg_apiKey').value;
      if (apiKey) {
        updates.llm_api_key = apiKey;
      }

      const data = await api('PUT', '/api/config', updates);
      if (data) {
        showToast(data.needsRestart ? '⚠️ 部分配置需要重启生效' : '✅ 配置已保存');
        if (data.errors?.length) showToast('⚠️ ' + data.errors.join(', '));
      }
    }

    async function reconnectWeChat() {
      if (!confirm('确定要重新连接微信吗？')) return;
      const data = await api('POST', '/api/control/reconnect');
      if (data) showToast(data.message);
      refreshStatus();
    }

    async function restartService() {
      if (!confirm('确定要重启服务吗？这会中断所有正在进行的对话。')) return;

      try {
        const data = await api('POST', '/api/control/restart', { reason: 'Manual restart' });
        if (data) {
          showToast('🔄 服务正在重启，请等待约 10 秒...');
        }
      } catch (e) {
        // Request may fail if server is shutting down
      }

      // Wait and retry to reload
      let retries = 0;
      const maxRetries = 15;
      const checkInterval = setInterval(async () => {
        retries++;
        try {
          const res = await fetch('/api/status/health');
          if (res.ok) {
            clearInterval(checkInterval);
            showToast('✅ 服务已重启');
            setTimeout(() => window.location.reload(), 1000);
          }
        } catch (e) {
          // Server still restarting
        }
        if (retries >= maxRetries) {
          clearInterval(checkInterval);
          showToast('⚠️ 请手动刷新页面');
        }
      }, 2000);
    }

    async function resetWatchdog() {
      const data = await api('POST', '/api/control/watchdog/reset');
      if (data) showToast('✅ 看门狗已重置');
      refreshStatus();
    }

    async function refreshLogs() {
      const data = await api('GET', '/api/status/logs?limit=100');
      if (!data) return;

      const container = document.getElementById('logContainer');
      container.innerHTML = (data.logs || []).map(log => {
        const time = new Date(log.time).toLocaleTimeString();
        return `<div class="log-line ${log.level}"><span class="log-time">[${time}]</span> ${escapeHtml(log.message)}</div>`;
      }).join('');
      container.scrollTop = container.scrollHeight;
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function showToast(msg) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.classList.add('show');
      setTimeout(() => el.classList.remove('show'), 3000);
    }

    // Template management
    const DEFAULT_HELP = `📖 可用功能
━━━━━━━━━━━━━━
🗣 @{botname} 提问 — AI对话
━━━ 工具 ━━━
🌤 天气 <城市> — 查天气
🔤 翻译 <文本> — 中英互译
━━━ 娱乐 ━━━
😂 讲个笑话
🔮 今天运势
💕 土味情话
🎯 抽签 / 抽奖
━━━ 群聊 ━━━
📊 群统计
📊 高频词
📋 今日总结
📋 昨天说了什么
🔍 搜索 <关键词>
━━━ 资讯 ━━━
📰 新闻
📅 历史上的今天
━━━ 账户 ━━━
💰 余额 — 查DeepSeek余额
📊 用量 — 查Token消耗
━━━ 游戏 ━━━
🎮 猜数字
🎮 成语接龙`;

    async function loadTemplate() {
      const key = document.getElementById('templateSelect').value;
      try {
        const data = await api('GET', `/api/templates/${key}`);
        if (data && data.content) {
          document.getElementById('templateContent').value = data.content;
        } else {
          // Use default
          if (key === 'help') {
            document.getElementById('templateContent').value = DEFAULT_HELP;
          }
        }
      } catch (e) {
        if (key === 'help') {
          document.getElementById('templateContent').value = DEFAULT_HELP;
        }
      }
    }

    async function saveTemplate() {
      const key = document.getElementById('templateSelect').value;
      const content = document.getElementById('templateContent').value;

      if (!content.trim()) {
        showToast('⚠️ 模板内容不能为空');
        return;
      }

      const data = await api('PUT', `/api/templates/${key}`, { content });
      if (data) showToast('✅ 模板已保存');
    }

    async function resetTemplate() {
      if (!confirm('确定要恢复默认模板吗？')) return;

      const key = document.getElementById('templateSelect').value;
      const data = await api('DELETE', `/api/templates/${key}`);
      if (data) {
        showToast('✅ 已恢复默认模板');
        loadTemplate();
      }
    }

    // Enter key for login
    document.getElementById('loginPass').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') doLogin();
    });
  </script>
</body>
</html>
